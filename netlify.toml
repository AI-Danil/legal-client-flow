[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://hook.eu1.make.com https://hook.eu2.make.com https://hooks.zapier.com https://*.n8n.cloud https://*.app.n8n.cloud https://api.telegram.org; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), clipboard-read=(), clipboard-write=(self)"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
